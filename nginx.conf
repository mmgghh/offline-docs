pid /tmp/nginx.pid;

events {
    worker_connections 256;
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    client_body_temp_path /tmp/client_temp;
    proxy_temp_path       /tmp/proxy_temp;
    fastcgi_temp_path     /tmp/fastcgi_temp;
    uwsgi_temp_path       /tmp/uwsgi_temp;
    scgi_temp_path        /tmp/scgi_temp;

    sendfile    on;
    tcp_nopush  on;
    gzip        on;
    gzip_types  text/html text/css application/javascript text/xml text/plain;

    resolver 127.0.0.11 valid=5s;

    server {
        listen 8080;
        root   /usr/share/nginx/html;
        index  index.html;
        absolute_redirect off;

        # Landing page
        location = / {
            default_type text/html;
            return 200 '<html><head><title>Offline Docs</title></head><body>
<h1>Offline Docs</h1>
<ul>
<li><a href="/python/">Python</a></li>
<li><a href="/go/">Go (stdlib)</a></li>
<li><a href="/git/">Git</a></li>
<li><a href="/postgresql/">PostgreSQL</a></li>
<li><a href="/docker/">Docker CLI</a></li>
<li><a href="/debian/">Debian Reference</a></li>
<li><a href="/sqlalchemy/">SQLAlchemy</a></li>
<li><a href="/django/">Django</a></li>
<li><a href="/nginx/">Nginx</a></li>
<li><a href="/uwsgi/">uWSGI</a></li>
<li><a href="/celery/">Celery</a></li>
</ul>
</body></html>';
        }

        # Go docs — reverse-proxy to pkgsite with URL rewriting
        location /go/ {
            set $go http://go-doc:8080;
            rewrite ^/go/(.*) /$1 break;
            proxy_pass $go;
            proxy_set_header Host $host;
            proxy_set_header Accept-Encoding "";
            proxy_redirect / /go/;
            sub_filter 'href="/' 'href="/go/';
            sub_filter 'src="/' 'src="/go/';
            sub_filter 'action="/' 'action="/go/';
            sub_filter "href='/" "href='/go/";
            sub_filter "src='/" "src='/go/";
            sub_filter "action='/" "action='/go/";
            sub_filter_once off;
            sub_filter_types text/html text/css application/javascript;
        }

        # Django docs — fix absolute paths from pre-built Sphinx HTML
        location /django/ {
            sub_filter '="/_static/' '="/django/_static/';
            sub_filter "='/_static/" "='/django/_static/";
            sub_filter '="/_images/' '="/django/_images/';
            sub_filter "='/_images/" "='/django/_images/";
            sub_filter_once off;
            sub_filter_types text/html application/javascript text/css;
            try_files $uri $uri/ =404;
        }

        # Everything else — static files
        location / {
            try_files $uri $uri/ =404;
        }

        add_header X-Content-Type-Options nosniff;
    }
}
